name: CI

# Build, vet, lint, and test on every push to main and on every pull request.
# The web build is pure Go (CGO disabled via modernc.org/sqlite) and the test
# suite runs fully offline against the mock/demo providers, so no secrets or
# network access are required.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      # Race detector + coverage. The whole pipeline (ingest-seed -> analyze ->
      # generate -> library, SEO, calendar, analytics, OAuth) is exercised here
      # via the internal/server httptest integration tests.
      #
      # Pinned to bash (available on all runners, incl. Windows) for consistent
      # argument parsing: PowerShell mangles `-coverprofile=coverage.out ./...`
      # into a phantom `.out` package argument, which fails setup.
      - name: Test
        shell: bash
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

  lint:
    name: Lint & formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-formatted:"
            echo "$unformatted"
            echo "Run 'gofmt -w .' to fix."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Verify go.mod / go.sum are tidy
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod/go.sum are not tidy. Run 'go mod tidy' and commit the result."
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
